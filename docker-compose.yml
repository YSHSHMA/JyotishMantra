version: '3.8'

services:
  application:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: application
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - net

  app-nginx:
    image: nginx:latest
    container_name: app-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - application
    networks:
      - net

  database:
    image: mysql:8.0
    container_name: database
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: mahakal_admin
      MYSQL_ROOT_PASSWORD: root

    ports:
      - "3307:3306"
    volumes:
      - database:/var/lib/mysql
    networks:
      - net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: application-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: database
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - database
    networks:
      - net

networks:
  net:

volumes:
  database: